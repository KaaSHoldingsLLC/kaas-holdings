name: Stale issue and PR management

on:
  schedule:
    # Run daily at 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/stale@v9
      with:
        # Issues
        days-before-issue-stale: 60
        days-before-issue-close: 14
        stale-issue-label: 'stale'
        stale-issue-message: >
          This issue has been automatically marked as stale because it has had no activity
          for 60 days. It will be closed in 14 days unless further activity occurs.
          If this is still relevant, please leave a comment.
        close-issue-message: >
          This issue was closed automatically after 14 days of inactivity following the
          stale notice. Re-open or create a new issue if it is still relevant.

        # Pull requests
        days-before-pr-stale: 30
        days-before-pr-close: 7
        stale-pr-label: 'stale'
        stale-pr-message: >
          This pull request has been automatically marked as stale because it has had no
          activity for 30 days. It will be closed in 7 days unless further activity occurs.
          Please rebase and update if it is still active.
        close-pr-message: >
          This pull request was closed automatically after 7 days of inactivity following
          the stale notice. Please re-open or create a new PR if the work is still needed.

        # Exempt labels — items with these labels are never marked stale
        exempt-issue-labels: 'pinned,security,in-progress'
        exempt-pr-labels: 'pinned,security,in-progress'

        # Cap operations per run to avoid hitting API rate limits
        operations-per-run: 100
